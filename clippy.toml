# Workspace-level clippy configuration.
#
# Per-lint settings that the `[workspace.lints]` table in `Cargo.toml`
# does not express live here. Currently this file sets exactly one
# entry: an allowlist for `clippy::multiple_crate_versions`.
#
# The allowlist is not a free pass — every entry has documented
# rationale below, with an explicit revisit signal. The lint stays
# watching for every other crate.
#
# === Allowlist rationale: cpufeatures ===
#
# `cpufeatures` is a runtime CPU-feature-detection helper, not a
# cryptographic primitive. Both 0.2.x and 0.3.x detect features via
# the same CPUID-based mechanism; the 0.2 → 0.3 break is API-shape
# only, not runtime-semantics. The duplicate is forced by upstream
# constraint mismatch: `sha3 =0.10.9` pulls `keccak 0.1.6`, which
# constrains `cpufeatures = "^0.2"`; `blake3 =1.8.5` uses
# `cpufeatures = "^0.3"`.
#
# **Revisit signal:** remove the `cpufeatures` entry when `sha3`'s
# transitive `keccak` widens its `cpufeatures` constraint to admit
# `^0.3` (or when bumping `sha3` brings in a `keccak` that does).
# Tracked in CONTRIBUTING.md "Verifications on record".
#
# === Allowlist rationale: RustCrypto ecosystem skew ===
#
# The ten entries below all share a single root cause. The RustCrypto
# project is mid-migration between trait-version generations: most of
# its crates exist in two parallel lines, the older "0.10" line (e.g.,
# `digest 0.10`, `signature 2.2`, `sha3 0.10`) and the newer
# "post-0.10" line (`digest 0.11`, `signature 3.0`, `sha3 0.11`,
# etc.). Adamant needs both `ed25519-dalek =2.2.0` (still on the older
# line as of crates.io snapshot) and `ml-dsa =0.1.0-rc.9` (on the
# newer line, FIPS 204 final), so both lines link into the runtime.
#
# Operational implications:
#   - Two SHA3 / Keccak implementations (`sha3 =0.10.9` + `keccak
#     0.1.6` for the Ed25519 path; `sha3 0.11.0` + `keccak 0.2.0` for
#     the ML-DSA path) link into the same binary. They produce
#     algorithmically identical outputs (both implement FIPS 202),
#     but the audit surface is doubled.
#   - Two `digest`, `signature`, and supporting trait crates live in
#     parallel. Each path uses its own; they do not interact.
#   - Larger binary size and longer compile times. Functional
#     correctness is unaffected.
#
# Entries:
#   block-buffer  : 0.10.4 (sha3 0.10 path) vs 0.12.0 (ml-dsa path)
#   const-oid     : 0.9.6  vs 0.10.2 (PKCS#8 / DER infrastructure)
#   crypto-common : 0.1.7  vs 0.2.1
#   der           : 0.7.10 vs 0.8.0
#   digest        : 0.10.7 vs 0.11.3
#   keccak        : 0.1.6  vs 0.2.0
#   pkcs8         : 0.10.2 vs 0.11.0
#   sha3          : 0.10.9 vs 0.11.0
#   signature     : 2.2.0  vs 3.0.0
#   spki          : 0.7.3  vs 0.8.0
#
# **Revisit signal (single, applies to all ten):** remove these
# entries when `ed25519-dalek` upgrades to the post-0.10 RustCrypto
# ecosystem (specifically: when it depends on `signature` 3.x,
# `digest` 0.11.x, etc.) OR when an alternative ML-DSA crate
# targeting the 0.10 ecosystem appears, whichever happens first.
# Tracked in CONTRIBUTING.md "Verifications on record" and in
# SECURITY.md "RustCrypto ecosystem skew".
#
# === Allowlist rationale: Sui-Move ecosystem skew ===
#
# Vendoring Sui-Move's `move-binary-format` and `move-core-types` at
# `mainnet-v1.66.2` (whitepaper §6.2.1.1, see vendor/README.md and
# SECURITY.md "Vendored upstream surface") brings in ten further
# multi-version duplicates. Sui's tree pins generic crates at
# specific versions chosen to match Sui's mainnet ecosystem; ours
# may pin them at different versions chosen for our own tree. The
# duplicates are forced by upstream constraint mismatch: resolving
# them in either direction would require modifying the vendored
# upstream code (forbidden per vendor/README.md "Modifications") or
# downgrading our own pins (which would lose features we rely on).
#
# Operational implications:
#   - None of the duplicated crates are cryptographic primitives or
#     consensus-critical infrastructure. They are generic utilities
#     (allocators, RNGs, helpers) whose behaviour at the API
#     surfaces consumed by either side does not vary across
#     versions in ways that affect correctness.
#   - Larger binary size and longer compile times. Functional
#     correctness is unaffected.
#
# Entries:
#   getrandom    : 0.2.17 / 0.3.4 / 0.4.2 (Sui's `move-core-types`
#                  vs our existing tree vs deeper transitive)
#   hashbrown    : 0.12.3 / 0.15.5 / 0.17.0 (likewise)
#   indexmap     : 1.9.3 / 2.14.0
#   r-efi        : 5.3.0 / 6.0.0 (transitive of getrandom)
#   rand         : 0.8.6 / 0.9.4
#   rand_chacha  : 0.3.1 / 0.9.0
#   rand_core    : 0.6.4 / 0.9.5 / 0.10.1
#   schemars     : 0.9.0 / 1.2.1 (JSON Schema; Sui dev-dep tree)
#   syn          : 1.0.109 / 2.0.117 (Sui's `move-proc-macros`
#                  pins syn 2 directly; rest of Sui's tree pins 1)
#   wit-bindgen  : 0.51.0 / 0.57.1 (transitive of getrandom)
#
# **Revisit signal (single, applies to all ten):** remove these
# entries when bumping the vendored Sui release tag brings the
# duplicates into alignment with our tree, or when our own deps
# move to versions that match Sui's pins. Tracked in CONTRIBUTING.md
# "Verifications on record" and in SECURITY.md "Vendored upstream
# surface".

allowed-duplicate-crates = [
    "cpufeatures",
    # RustCrypto 0.10 / post-0.10 generation skew (see rationale above):
    "block-buffer",
    "const-oid",
    "crypto-common",
    "der",
    "digest",
    "keccak",
    "pkcs8",
    "sha3",
    "signature",
    "spki",
    # Sui-Move ecosystem skew from vendoring `move-binary-format` and
    # `move-core-types` at `mainnet-v1.66.2` (see rationale above):
    "getrandom",
    "hashbrown",
    "indexmap",
    "r-efi",
    "rand",
    "rand_chacha",
    "rand_core",
    "schemars",
    "syn",
    "wit-bindgen",
]
