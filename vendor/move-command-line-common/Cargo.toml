[package]
name = "move-command-line-common"
description = "Vendored from Sui-Move per whitepaper §6.2.1.6 (mainnet-v1.66.2). Shared CLI / file-handling helpers (transitive via move-regex-borrow-graph). See PROVENANCE.md for the upstream tag and audit posture."
version.workspace = true
authors = ["Diem Association <opensource@diem.com>", "The Move Contributors", "Mysten Labs <build@mystenlabs.com>"]
repository = "https://github.com/MystenLabs/sui"
license = "Apache-2.0"
edition = "2024"
publish = false

[dependencies]
anyhow.workspace = true
bcs.workspace = true
colored.workspace = true
dirs-next.workspace = true
hex.workspace = true
insta = { workspace = true, features = ["serde"] }
packed_struct.workspace = true
serde.workspace = true
sha2.workspace = true
vfs.workspace = true
walkdir.workspace = true

move-binary-format.workspace = true
move-core-types.workspace = true
move-symbol-pool.workspace = true

[dev-dependencies]
proptest.workspace = true

# Lint posture for vendored upstream code.
# `unsafe_code` is set per-crate based on empirical upstream
# inspection (forbid for crates without unsafe; allow for crates
# carrying upstream unsafe blocks per SECURITY.md "Vendored
# upstream surface").
# Clippy lints are deferred to upstream's CI: running our
# workspace clippy posture against byte-identical upstream code
# produces noise rather than signal. Style lints belong in
# upstream's process; we trust the tag.
[lints.rust]
unsafe_code = "forbid"

[lints.clippy]
all = "allow"
