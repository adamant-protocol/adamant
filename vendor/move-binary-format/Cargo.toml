[package]
name = "move-binary-format"
description = "Vendored from Sui-Move per whitepaper §6.2.1.2 (mainnet-v1.66.2). See PROVENANCE.md for the upstream tag and audit posture."
version.workspace = true
authors = ["Diem Association <opensource@diem.com>", "The Move Contributors", "Mysten Labs <build@mystenlabs.com>"]
repository = "https://github.com/MystenLabs/sui"
license = "Apache-2.0"
edition = "2024"
publish = false

[dependencies]
anyhow.workspace = true
proptest = { workspace = true, optional = true }
proptest-derive = { workspace = true, optional = true }
ref-cast.workspace = true
variant_count.workspace = true
move-core-types.workspace = true
serde.workspace = true
arbitrary = { workspace = true, optional = true, features = ["derive"] }
enum-compat-util.workspace = true
move-proc-macros.workspace = true
indexmap.workspace = true
move-abstract-interpreter.workspace = true

# wasm support (requires js feature of getrandom)
getrandom = { workspace = true, features = ["js"], optional = true }

[dev-dependencies]
proptest.workspace = true
proptest-derive.workspace = true
move-core-types = { workspace = true, features = ["fuzzing"] }
serde_json.workspace = true

[features]
default = []
testing = []
fuzzing = ["proptest", "proptest-derive", "arbitrary", "move-core-types/fuzzing"]
wasm = ["getrandom"]

# Lint posture for vendored upstream code.
# `unsafe_code` is set per-crate based on empirical upstream
# inspection (forbid for crates without unsafe; allow for crates
# carrying upstream unsafe blocks per SECURITY.md "Vendored
# upstream surface").
# Clippy lints are deferred to upstream's CI: running our
# workspace clippy posture against byte-identical upstream code
# produces noise rather than signal. Style lints belong in
# upstream's process; we trust the tag.
[lints.rust]
unsafe_code = "forbid"  # matches upstream's own `#![forbid(unsafe_code)]` in src/lib.rs

[lints.clippy]
all = "allow"
