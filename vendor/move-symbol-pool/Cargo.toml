[package]
name = "move-symbol-pool"
description = "Placeholder for Sui-Move's move-symbol-pool crate (Batch 2; static global string-interning pool), vendored per whitepaper §6.2.1.6 (mainnet-v1.66.2) as a transitive dependency of move-command-line-common. Actual upstream code lands in a follow-up commit per vendor/README.md."
version.workspace = true
edition.workspace = true
license = "Apache-2.0"
repository = "https://github.com/MystenLabs/sui"
authors = ["Sui contributors (vendored by Adamant)"]
publish = false

# Lint posture for vendored upstream code.
# `unsafe_code` is set per-crate based on empirical upstream
# inspection (forbid for crates without unsafe; allow for crates
# carrying upstream unsafe blocks per SECURITY.md "Vendored
# upstream surface").
# Clippy lints are deferred to upstream's CI: running our
# workspace clippy posture against byte-identical upstream code
# produces noise rather than signal. Style lints belong in
# upstream's process; we trust the tag.
[lints.rust]
unsafe_code = "allow"  # carries upstream unsafe (string-interning, servo/string-cache pattern; full enumeration in PROVENANCE.md at vendor commit)

[lints.clippy]
all = "allow"
