[package]
name = "move-symbol-pool"
description = "Vendored from Sui-Move per whitepaper §6.2.1.6 (mainnet-v1.66.2). Static global string-interning pool (transitive via move-command-line-common). See PROVENANCE.md for the upstream tag and audit posture."
version.workspace = true
authors = ["Diem Association <opensource@diem.com>", "The Move Contributors", "Mysten Labs <build@mystenlabs.com>"]
repository = "https://github.com/MystenLabs/sui"
license = "Apache-2.0"
edition = "2024"
publish = false

[dependencies]
serde.workspace = true
phf.workspace = true

[dev-dependencies]
serde_json.workspace = true

[features]
default = []

# Lint posture for vendored upstream code.
# `unsafe_code` is set per-crate based on empirical upstream
# inspection (forbid for crates without unsafe; allow for crates
# carrying upstream unsafe blocks per SECURITY.md "Vendored
# upstream surface").
# Clippy lints are deferred to upstream's CI: running our
# workspace clippy posture against byte-identical upstream code
# produces noise rather than signal. Style lints belong in
# upstream's process; we trust the tag.
[lints.rust]
unsafe_code = "allow"  # carries upstream unsafe (string-interning, servo/string-cache pattern; full enumeration in PROVENANCE.md)

[lints.clippy]
all = "allow"
