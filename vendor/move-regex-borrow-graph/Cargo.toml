[package]
name = "move-regex-borrow-graph"
description = "Vendored from Sui-Move per whitepaper §6.2.1.6 (mainnet-v1.66.2). Regex-based borrow graph consumed by move-bytecode-verifier's regex_reference_safety pass. See PROVENANCE.md for the upstream tag and audit posture."
version.workspace = true
authors = ["The Move Contributors"]
repository = "https://github.com/MystenLabs/sui"
license = "Apache-2.0"
edition = "2024"
publish = false

[dependencies]
itertools.workspace = true
proptest.workspace = true
insta.workspace = true

move-binary-format.workspace = true
move-core-types.workspace = true
move-command-line-common.workspace = true
petgraph.workspace = true

[dev-dependencies]
datatest-stable.workspace = true

[[test]]
name = "borrow_graph_tests"
harness = false

# Lint posture for vendored upstream code.
# `unsafe_code` is set per-crate based on empirical upstream
# inspection (forbid for crates without unsafe; allow for crates
# carrying upstream unsafe blocks per SECURITY.md "Vendored
# upstream surface").
# Clippy lints are deferred to upstream's CI: running our
# workspace clippy posture against byte-identical upstream code
# produces noise rather than signal. Style lints belong in
# upstream's process; we trust the tag.
[lints.rust]
unsafe_code = "forbid"  # matches upstream's own `#![forbid(unsafe_code)]` in src/lib.rs

[lints.clippy]
all = "allow"
